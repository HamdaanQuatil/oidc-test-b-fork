name: PRT OIDC Test
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Capture OIDC token claims
        run: |
          set -e
          RESP=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=test")
          TOKEN=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | python3 -c "
import sys, base64
d = sys.stdin.read().strip()
pad = (4 - len(d) % 4) % 4
print(base64.b64decode(d + chr(61)*pad).decode())
")
          echo "$PAYLOAD" | python3 -m json.tool
          echo "=== KEY CLAIMS ==="
          echo "$PAYLOAD" | python3 -c "
import sys, json
p = json.loads(sys.stdin.read())
for k in ['sub','repository','repository_owner','actor','event_name','ref','environment','ref_protected']:
    print(k + ': ' + str(p.get(k, 'N/A')))
"
